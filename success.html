<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>報名成功！ — 科技守護．智慧安居</title>
  <style>
    :root {
      --primary: #0D7377;
      --primary-light: #14919B;
      --success: #27AE60;
      --text: #1A2A2A;
      --text-light: #5A6F6F;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "PingFang TC", "Noto Sans TC", sans-serif;
      background: linear-gradient(135deg, #F7FAFA 0%, #E8F5F5 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 3rem 2.5rem;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 30px rgba(13,115,119,0.1);
    }
    .confetti {
      font-size: 3rem;
      margin-bottom: 0.5rem;
      animation: bounce 0.6s ease;
    }
    @keyframes bounce {
      0% { transform: scale(0); }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }
    .check-circle {
      width: 80px;
      height: 80px;
      background: var(--success);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      animation: pop 0.5s ease;
    }
    @keyframes pop {
      0% { transform: scale(0); opacity: 0; }
      60% { transform: scale(1.15); }
      100% { transform: scale(1); opacity: 1; }
    }
    .check-circle svg {
      width: 40px;
      height: 40px;
      stroke: #fff;
      stroke-width: 3;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    h1 {
      font-size: 1.6rem;
      color: var(--text);
      margin-bottom: 0.5rem;
    }
    .subtitle {
      font-size: 1rem;
      color: var(--primary);
      font-weight: 600;
      margin-bottom: 1.5rem;
    }
    .message {
      font-size: 0.95rem;
      color: var(--text-light);
      line-height: 1.8;
      margin-bottom: 2rem;
    }
    .contact-box {
      background: #F4F9F9;
      border-radius: 12px;
      padding: 1rem 1.25rem;
      margin-bottom: 2rem;
      text-align: left;
    }
    .contact-box .contact-title {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--primary);
      margin-bottom: 0.5rem;
    }
    .contact-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.9rem;
      padding: 0.2rem 0;
    }
    .contact-row .area {
      font-weight: 600;
      color: var(--text);
    }
    .contact-row .phone {
      color: var(--text-light);
    }
    .btn-back {
      display: inline-block;
      padding: 0.75rem 2rem;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      font-family: inherit;
      text-decoration: none;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-back:hover { opacity: 0.9; }
    .footer {
      margin-top: 2rem;
      font-size: 0.75rem;
      color: var(--text-light);
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="confetti">&#127881;</div>
    <div class="check-circle">
      <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>
    </div>
    <h1>報名成功！</h1>
    <div class="subtitle">【科技守護．智慧安居】教育訓練</div>
    <div class="message">
      感謝您的報名！<br>
      我們已收到您的資料，活動當天請準時出席。<br>
      如需更改或取消報名，請聯繫以下窗口。
    </div>
    <div class="contact-box">
      <div class="contact-title">聯繫窗口</div>
      <div class="contact-row">
        <span class="area">屏中區</span>
        <span class="phone">(08) 789-9599 #22 陳社工</span>
      </div>
      <div class="contact-row">
        <span class="area">屏北區</span>
        <span class="phone">(08) 736-5455 #24 孫社工</span>
      </div>
    </div>
    <a href="/" class="btn-back">返回報名頁面</a>
  </div>

  <div class="footer">屏東縣輔具資源中心（屏中區／屏北區）</div>

</body>
</html>
